<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criador de Personagem Escolar</title>

<style>
body{
font-family: Arial, sans-serif;
background:#111;
color:white;
margin:0;
padding:12px;
}

h1{text-align:center}

.container{
max-width:600px;
margin:auto;
}

label{
display:block;
margin-top:12px;
}

select,input{
width:100%;
padding:12px;
margin-top:4px;
border-radius:10px;
border:none;
font-size:16px;
}

textarea{
width:100%;
margin-top:20px;
padding:12px;
border-radius:10px;
border:none;
font-size:15px;
background:#222;
color:white;
height:260px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">
<h1>🎒 Criador de Personagem Escolar</h1>

<label>Nome</label>
<input id="nome" placeholder="Nome do personagem" oninput="gerar()">

<label>Gênero</label>
<select id="genero" onchange="gerar()">
<option>Masculino</option>
<option>Feminino</option>
</select>

<label>Origem Escolar</label>
<select id="classe" onchange="gerar()">
<option>Nerd</option>
<option>Aluno de Teatro</option>
<option>Atleta</option>
<option>Jornalista</option>
<option>Aluno Rebelde</option>
<option>Representante de Sala</option>
<option>Influencer</option>
<option>Bibliotecário</option>
<option>Valentão</option>
</select>

<label>Cabelo</label>
<select id="cabelo" onchange="gerar()">
<option>Curto</option>
<option>Longo</option>
<option>Rabo de cavalo</option>
<option>Espetado</option>
<option>Ondulado</option>
</select>

<label>Cor do cabelo</label>
<select id="corcabelo" onchange="gerar()">
<option>Preto</option>
<option>Castanho</option>
<option>Loiro</option>
<option>Branco</option>
<option>Vermelho</option>
<option>Azul</option>
</select>

<label>Rosto</label>
<select id="rosto" onchange="gerar()">
<option>Normal</option>
<option>Sério</option>
<option>Feliz</option>
<option>Misterioso</option>
<option>Cicatriz no rosto</option>
</select>

<textarea id="resultado" readonly></textarea>

<button onclick="copiar()">Copiar Resultado</button>

</div>

<script>

const origens = {

"Nerd":{
pericias:"Investigação, Tecnologia",
habilidade:"Mente Analítica: +2 em testes de Investigação ou Tecnologia ao analisar pistas ou computadores."
},

"Aluno de Teatro":{
pericias:"Enganação, Artes",
habilidade:"Atuação Convincente: uma vez por cena pode rerrolar teste de Enganação."
},

"Atleta":{
pericias:"Atletismo, Fortitude",
habilidade:"Condicionamento Físico: +2 em Atletismo durante corridas ou perseguições."
},

"Jornalista":{
pericias:"Investigação, Percepção",
habilidade:"Caçador de Histórias: uma vez por sessão o mestre fornece uma pista."
},

"Aluno Rebelde":{
pericias:"Crime, Furtividade",
habilidade:"Passos Silenciosos: +2 em Furtividade dentro da escola."
},

"Representante de Sala":{
pericias:"Persuasão, Vontade",
habilidade:"Voz da Turma: uma vez por cena dá +1d em teste social de um aliado."
},

"Influencer":{
pericias:"Persuasão, Enganação",
habilidade:"Popularidade: +2 em testes sociais com estudantes."
},

"Bibliotecário":{
pericias:"Investigação, Ciências",
habilidade:"Arquivo Vivo: +2 em investigação ao pesquisar livros."
},

"Valentão":{
pericias:"Intimidação, Crime",
habilidade:"Presença Ameaçadora: uma vez por cena rola +1d em Intimidação."
}

}

function gerar(){

let nome = document.getElementById("nome").value || "(sem nome)"
let genero = document.getElementById("genero").value
let classe = document.getElementById("classe").value
let cabelo = document.getElementById("cabelo").value
let corcabelo = document.getElementById("corcabelo").value
let rosto = document.getElementById("rosto").value

let pericias = origens[classe].pericias
let habilidade = origens[classe].habilidade

let texto =
"PERSONAGEM ESCOLAR\n\n"+
"Nome: "+nome+"\n"+
"Gênero: "+genero+"\n"+
"Origem: "+classe+"\n\n"+
"Cabelo: "+cabelo+"\n"+
"Cor do cabelo: "+corcabelo+"\n"+
"Rosto: "+rosto+"\n\n"+
"Perícias: "+pericias+"\n\n"+
"Habilidade:\n"+habilidade

document.getElementById("resultado").value = texto
}

function copiar(){
let campo = document.getElementById("resultado")
campo.select()
document.execCommand("copy")
alert("Personagem copiado!")
}

gerar()

</script>

</body>
</html>

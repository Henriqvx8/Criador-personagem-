<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de XP RPG</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
cursor:pointer;
}

.player{
background:#222;
padding:15px;
margin-top:15px;
border-radius:10px;
}

.bar{
width:100%;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:20px;
background:#4CAF50;
width:0%;
}

</style>

</head>

<body>

<h1>🎮 Sistema de XP</h1>

<div class="container">

<input id="nomePlayer" placeholder="Nome do jogador">

<button onclick="addPlayer()">Adicionar Player</button>

<div id="players"></div>

</div>

<script>

const XP_LEVEL = 20000

function addPlayer(){

let nome = document.getElementById("nomePlayer").value

if(nome=="") return

let div = document.createElement("div")
div.className="player"

div.innerHTML = `
<h3>${nome}</h3>

Level: <span class="level">1</span>

<div class="bar">
<div class="progress"></div>
</div>

XP: <span class="xp">0</span> / ${XP_LEVEL}

<br><br>

<input class="xpInput" placeholder="XP ganho">
<button onclick="addXP(this)">Adicionar XP</button>
`

document.getElementById("players").appendChild(div)

document.getElementById("nomePlayer").value=""

}

function addXP(btn){

let player = btn.parentElement

let xpSpan = player.querySelector(".xp")
let levelSpan = player.querySelector(".level")
let progress = player.querySelector(".progress")
let input = player.querySelector(".xpInput")

let xp = parseInt(xpSpan.innerText)
let level = parseInt(levelSpan.innerText)
let ganho = parseInt(input.value)

if(isNaN(ganho)) return

xp += ganho

while(xp >= XP_LEVEL){

xp -= XP_LEVEL
level++

alert("LEVEL UP! Agora nível "+level)

}

xpSpan.innerText = xp
levelSpan.innerText = level

let percent = (xp / XP_LEVEL) * 100

progress.style.width = percent+"%"

input.value=""

}

</script>

</body>
</html>
